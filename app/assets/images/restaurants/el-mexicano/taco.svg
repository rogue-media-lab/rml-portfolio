<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Taco illustration - colorful flat style -->
  <defs>
    <linearGradient id="shell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="100%" style="stop-color:#E8912D"/>
    </linearGradient>
    <linearGradient id="shell2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8912D"/>
      <stop offset="100%" style="stop-color:#D4781E"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Shadow under taco -->
  <ellipse cx="200" cy="265" rx="120" ry="18" fill="#D4781E" opacity="0.2"/>
  
  <!-- Taco shell back -->
  <path d="M70 220 Q70 80 200 60 Q330 80 330 220 Z" fill="url(#shell2)" filter="url(#shadow)"/>
  
  <!-- Lettuce layer -->
  <path d="M90 200 Q110 140 200 120 Q290 140 310 200 Q280 185 260 195 Q240 175 220 190 Q200 170 180 190 Q160 175 140 195 Q120 180 90 200Z" fill="#4CAF50"/>
  <path d="M100 205 Q120 150 200 130 Q280 150 300 205 Q275 190 255 200 Q235 185 215 195 Q200 180 185 195 Q165 185 145 200 Q125 190 100 205Z" fill="#66BB6A"/>
  
  <!-- Tomato chunks -->
  <circle cx="140" cy="175" r="12" fill="#F44336"/>
  <circle cx="155" cy="168" r="8" fill="#EF5350"/>
  <circle cx="250" cy="175" r="12" fill="#F44336"/>
  <circle cx="235" cy="168" r="8" fill="#EF5350"/>
  <circle cx="195" cy="155" r="10" fill="#F44336"/>
  <circle cx="210" cy="160" r="7" fill="#EF5350"/>
  
  <!-- Cheese -->
  <path d="M120 190 L140 170 L160 188 L175 172 L195 190 L215 175 L235 188 L250 170 L270 190" fill="none" stroke="#FFD54F" stroke-width="6" stroke-linecap="round"/>
  <circle cx="160" cy="180" r="5" fill="#FFE082"/>
  <circle cx="230" cy="182" r="5" fill="#FFE082"/>
  <circle cx="195" cy="170" r="4" fill="#FFE082"/>
  
  <!-- Meat layer -->
  <path d="M100 210 Q120 180 200 165 Q280 180 300 210 Q280 200 260 208 Q240 195 220 205 Q200 192 180 205 Q160 195 140 208 Q120 200 100 210Z" fill="#8D6E63"/>
  <path d="M110 213 Q130 188 200 175 Q270 188 290 213" fill="none" stroke="#795548" stroke-width="3" opacity="0.5"/>
  
  <!-- Taco shell front -->
  <path d="M65 230 Q65 220 70 210 Q80 190 100 175 Q130 155 170 145 Q200 140 200 140 Q200 140 230 145 Q270 155 300 175 Q320 190 330 210 Q335 220 335 230" fill="none" stroke="#D4781E" stroke-width="4"/>
  
  <!-- Shell highlight -->
  <path d="M80 220 Q90 150 200 110" fill="none" stroke="#FFD54F" stroke-width="3" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Small sauce drips -->
  <path d="M150 210 Q148 225 155 235" fill="none" stroke="#F44336" stroke-width="3" stroke-linecap="round"/>
  <path d="M240 208 Q242 222 238 232" fill="none" stroke="#F44336" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Steam lines -->
  <path d="M170 55 Q165 40 170 25" fill="none" stroke="#BDBDBD" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M200 50 Q195 32 200 15" fill="none" stroke="#BDBDBD" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M230 55 Q225 40 230 25" fill="none" stroke="#BDBDBD" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
</svg>
